<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>企業 AI 智慧轉型體質檢測</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --teal-deep:   #0a7c82;
    --teal-mid:    #12a0a8;
    --teal-light:  #3ecfd8;
    --teal-pale:   #c8f0f3;
    --teal-bg:     #e0f7f9;
    --amber:       #f5a623;
    --white:       #ffffff;
    --text-dark:   #0d3a3d;
    --text-mid:    #1f6b70;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--teal-bg);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem 4rem;
    position: relative;
    overflow: hidden;
  }
  #hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(62,207,216,0.18) 0%, transparent 70%),
      radial-gradient(circle 400px at 10% 80%, rgba(18,160,168,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  /* decorative circles */
  #hero::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    border: 60px solid rgba(62,207,216,0.07);
    top: -120px; right: -100px;
    pointer-events: none;
  }

  .hero-banner {
    width: 100%;
    max-width: 820px;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }
  .hero-banner img {
    width: 100%;
    display: block;
  }
  /* Fallback gradient banner when no image */
  .hero-banner-fallback {
    background: linear-gradient(135deg, #0a7c82 0%, #12a0a8 40%, #3ecfd8 100%);
    padding: 3rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero-banner-fallback::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    right: -60px; top: -80px;
  }
  .hero-banner-fallback .sub-title {
    font-size: .85rem;
    color: rgba(255,255,255,.75);
    letter-spacing: .08em;
    margin-bottom: .5rem;
  }
  .hero-banner-fallback h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    color: #fff;
    line-height: 1.25;
  }

  .hero-intro {
    text-align: center;
    max-width: 560px;
    position: relative;
    z-index: 1;
    margin-bottom: 2rem;
  }
  .hero-intro .tag {
    display: inline-block;
    font-size: .8rem;
    font-weight: 700;
    color: var(--teal-mid);
    letter-spacing: .12em;
    margin-bottom: .75rem;
  }
  .hero-intro p {
    font-size: .95rem;
    color: var(--text-mid);
    line-height: 1.8;
  }

  /* perks */
  .perks-row {
    display: flex;
    gap: 1rem;
    max-width: 640px;
    width: 100%;
    margin-bottom: 2rem;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
    justify-content: center;
  }
  .perk-box {
    flex: 1;
    min-width: 200px;
    background: rgba(255,255,255,0.6);
    border: 2px dashed var(--teal-mid);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    text-align: center;
    font-size: .82rem;
    color: var(--text-mid);
    line-height: 1.6;
  }
  .perk-box strong {
    color: var(--amber);
    font-weight: 700;
  }

  /* CTA button */
  .btn-cta {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: .75rem;
    background: linear-gradient(90deg, var(--teal-mid) 0%, var(--teal-light) 100%);
    color: #fff;
    font-size: 1.4rem;
    font-weight: 800;
    padding: 1.1rem 3rem;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: transform .2s, filter .2s;
    text-decoration: none;
    letter-spacing: .04em;
  }
  .btn-cta:hover { transform: scale(1.04); filter: brightness(1.08); }
  .btn-cta .icon-circle {
    width: 2.2rem; height: 2.2rem;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  /* ── QUIZ ── */
  #quiz {
    min-height: 100vh;
    padding: 0 1rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* progress bar */
  .progress-bar-wrap {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.4);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal-deep), var(--teal-light));
    transition: width .5s cubic-bezier(.4,0,.2,1);
    border-radius: 0 4px 4px 0;
  }

  .quiz-inner {
    width: 100%;
    max-width: 660px;
    padding-top: 2.5rem;
  }

  .q-counter {
    font-size: .8rem;
    font-weight: 600;
    color: var(--teal-mid);
    letter-spacing: .1em;
    text-align: right;
    margin-bottom: .75rem;
  }

  .q-card {
    background: linear-gradient(135deg, var(--teal-deep) 0%, var(--teal-mid) 100%);
    border-radius: 14px;
    padding: 2.5rem 2rem 3rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
    text-align: left;
  }
  .q-card::before {
    content: '!';
    position: absolute;
    right: 2rem; bottom: -1.5rem;
    font-size: 8rem;
    font-weight: 900;
    color: rgba(255,255,255,.06);
    line-height: 1;
    pointer-events: none;
  }
  .q-category {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .15em;
    color: var(--teal-pale);
    margin-bottom: .75rem;
    text-transform: uppercase;
  }
  .q-text {
    font-size: clamp(1.1rem, 3vw, 1.45rem);
    font-weight: 700;
    color: #fff;
    line-height: 1.5;
  }

  /* alert icon inside q-card (optional) */
  .q-icon {
    width: 3.5rem; height: 3.5rem;
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    color: rgba(255,255,255,.8);
    margin: 1.5rem auto 0;
  }

  /* options */
  .options-list { display: flex; flex-direction: column; gap: .9rem; }

  .option-btn {
    background: rgba(255,255,255,0.75);
    border: 2px solid transparent;
    border-radius: 50px;
    padding: 1rem 1.5rem;
    text-align: left;
    font-size: .95rem;
    color: var(--text-dark);
    cursor: pointer;
    transition: all .18s ease;
    line-height: 1.5;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    position: relative;
    overflow: hidden;
  }
  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--teal-mid), var(--teal-light));
    opacity: 0;
    transition: opacity .18s;
  }
  .option-btn span { position: relative; z-index: 1; }
  .option-btn:hover {
    border-color: var(--teal-mid);
    background: rgba(255,255,255,0.95);
    transform: translateX(4px);
  }
  .option-btn.selected {
    border-color: var(--teal-mid);
    background: rgba(255,255,255,0.95);
    color: var(--teal-deep);
    font-weight: 700;
  }
  .option-btn.selected::before { opacity: 0; }
  .option-btn.selected .option-dot { background: var(--teal-mid); }

  .option-dot {
    display: inline-block;
    width: .6rem; height: .6rem;
    border-radius: 50%;
    background: var(--teal-pale);
    margin-right: .6rem;
    vertical-align: middle;
    flex-shrink: 0;
    transition: background .18s;
  }

  .q-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 2rem;
  }
  .btn-prev {
    background: transparent;
    border: 2px solid var(--teal-mid);
    color: var(--teal-mid);
    font-size: .9rem;
    font-weight: 600;
    padding: .65rem 1.5rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all .18s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .btn-prev:hover { background: var(--teal-mid); color: #fff; }
  .btn-prev:disabled { opacity: .3; cursor: default; }
  .btn-prev:disabled:hover { background: transparent; color: var(--teal-mid); }

  .btn-next {
    background: linear-gradient(90deg, var(--teal-deep), var(--teal-mid));
    border: none;
    color: #fff;
    font-size: .95rem;
    font-weight: 700;
    padding: .75rem 2.2rem;
    border-radius: 50px;
    cursor: pointer;
    transition: transform .18s, filter .18s;
    font-family: 'Noto Sans TC', sans-serif;
    letter-spacing: .04em;
  }
  .btn-next:hover { transform: scale(1.04); filter: brightness(1.1); }
  .btn-next:disabled { opacity: .4; cursor: default; }
  .btn-next:disabled:hover { transform: none; filter: none; }

  /* ── RESULT ── */
  #result {
    min-height: 100vh;
    padding: 0 1rem 5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .result-inner {
    width: 100%;
    max-width: 600px;
    padding-top: 2.5rem;
  }

  .score-box-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2rem;
  }
  .score-label {
    font-size: .8rem;
    font-weight: 700;
    letter-spacing: .18em;
    color: var(--teal-mid);
    background: rgba(255,255,255,.7);
    border-radius: 50px;
    padding: .3rem 1.2rem;
    margin-bottom: .75rem;
  }
  .score-box {
    background: #fff;
    border-radius: 16px;
    width: 180px; height: 140px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem;
  }
  .score-num {
    font-size: 4rem;
    font-weight: 900;
    font-family: 'Outfit', sans-serif;
    color: var(--teal-mid);
    line-height: 1;
  }

  .result-tag-label {
    font-size: .8rem;
    color: var(--text-mid);
    margin-bottom: .5rem;
    text-align: center;
  }
  .result-level-badge {
    display: inline-block;
    background: linear-gradient(90deg, #7b8fe0, #9baae8);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    padding: .5rem 1.8rem;
    border-radius: 8px;
    letter-spacing: .05em;
    margin-bottom: 2rem;
  }

  .result-card {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .result-card-header {
    background: linear-gradient(90deg, var(--teal-mid), var(--teal-light));
    padding: 1.25rem 1.5rem;
  }
  .result-card-header h2 {
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.4;
  }
  .result-card-body {
    padding: 1.5rem;
  }
  .result-card-body .result-quote {
    font-size: .95rem;
    line-height: 1.85;
    color: #444;
    margin-bottom: 1.2rem;
    border-left: 4px solid var(--teal-pale);
    padding-left: 1rem;
  }
  .result-suggest-title {
    font-size: .78rem;
    font-weight: 700;
    color: var(--teal-mid);
    letter-spacing: .1em;
    margin-bottom: .5rem;
  }
  .result-suggest-text {
    font-size: .88rem;
    line-height: 1.8;
    color: #555;
  }

  /* dimension bars */
  .dim-bar-wrap { margin-bottom: 1.5rem; }
  .dim-bar-wrap h3 {
    font-size: .8rem;
    font-weight: 700;
    letter-spacing: .12em;
    color: var(--teal-deep);
    margin-bottom: .75rem;
    text-transform: uppercase;
  }
  .dim-item { margin-bottom: .6rem; }
  .dim-label-row {
    display: flex;
    justify-content: space-between;
    font-size: .78rem;
    color: var(--text-mid);
    margin-bottom: .2rem;
  }
  .dim-bar-bg {
    height: 8px;
    background: var(--teal-pale);
    border-radius: 4px;
    overflow: hidden;
  }
  .dim-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal-deep), var(--teal-light));
    border-radius: 4px;
    transition: width 1s .3s cubic-bezier(.4,0,.2,1);
  }

  /* restart button */
  .btn-restart {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    background: rgba(255,255,255,0.7);
    border: 2px solid var(--teal-mid);
    color: var(--teal-mid);
    font-size: 1rem;
    font-weight: 700;
    padding: .8rem 2.5rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Noto Sans TC', sans-serif;
    margin-top: .5rem;
  }
  .btn-restart:hover { background: var(--teal-mid); color: #fff; transform: scale(1.03); }

  /* fade-in animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp .45s ease both; }

  /* responsive */
  @media(max-width: 480px) {
    .q-card { padding: 1.75rem 1.25rem 2.5rem; }
    .btn-cta { font-size: 1.1rem; padding: 1rem 2rem; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     SCREEN 1 : HERO / LANDING
══════════════════════════════════════════ -->
<div id="hero" class="screen active">

  <!-- Banner image (replace src with your own) -->
  <div class="hero-banner">
    <!-- If you have the banner image, use: <img src="YOUR_BANNER.jpg" alt="banner" /> -->
    <!-- Fallback shown below -->
    <div class="hero-banner-fallback">
      <p class="sub-title">AI 賦能：產業躍升與 AI 智慧轉型關鍵評估</p>
      <h1>企業全方位智進 AI<br/>免費智慧健檢服務</h1>
    </div>
  </div>

  <div class="hero-intro">
    <span class="tag">▶ All in AI！全方位 AI 智慧轉型 體質檢測</span>
    <p>
      本問卷旨在協助貴公司快速評估當前營運狀況與市場趨勢，<br/>
      了解導入智慧化解決方案的急迫性與潛在效益。<br/>
      請根據貴公司實際情況，選擇最符合的選項。
    </p>
  </div>

  <div class="perks-row">
    <div class="perk-box">
      由專家提供<strong>免費</strong><br/>
      【智慧轉型產業升級報告書】
    </div>
    <div class="perk-box">
      預約前 <strong>30</strong> 名再享<br/>
      【智進 AI 早鳥優惠方案】
    </div>
  </div>

  <button class="btn-cta" onclick="startQuiz()">
    <span class="icon-circle">»</span>
    立即免費線上檢測
  </button>
</div>


<!-- ══════════════════════════════════════════
     SCREEN 2 : QUIZ
══════════════════════════════════════════ -->
<div id="quiz" class="screen">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="quiz-inner">
    <div class="q-counter" id="qCounter">問題 1 / 8</div>

    <div class="q-card fade-up" id="qCard">
      <div class="q-category" id="qCategory">類別</div>
      <div class="q-text" id="qText">問題文字</div>
      <div class="q-icon">!</div>
    </div>

    <div class="options-list" id="optionsList"></div>

    <div class="q-nav">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()" disabled>← 上一題</button>
      <button class="btn-next" id="btnNext" onclick="nextQ()" disabled>下一題 →</button>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════
     SCREEN 3 : RESULT
══════════════════════════════════════════ -->
<div id="result" class="screen">
  <div class="result-inner fade-up">

    <div class="score-box-wrap">
      <span class="score-label">得 分</span>
      <div class="score-box">
        <span class="score-num" id="scoreNum">0</span>
      </div>
      <p class="result-tag-label">您的檢測結果是⋯</p>
      <span class="result-level-badge" id="levelBadge">等級名稱</span>
    </div>

    <!-- dimension bars -->
    <div class="result-card">
      <div class="result-card-body">
        <div class="dim-bar-wrap">
          <h3>各面向得分</h3>
          <div id="dimBars"></div>
        </div>
      </div>
    </div>

    <!-- diagnosis card -->
    <div class="result-card">
      <div class="result-card-header">
        <h2 id="resultTitle">全方位 AI 智慧轉型體質自我檢測結果</h2>
      </div>
      <div class="result-card-body">
        <p class="result-quote" id="resultDesc">診斷說明</p>
        <p class="result-suggest-title">建議分析</p>
        <p class="result-suggest-text" id="resultSuggest">建議內容</p>
      </div>
    </div>

    <div style="text-align:center;">
      <button class="btn-restart" onclick="restart()">↺ 重新檢測</button>
    </div>

  </div>
</div>


<script>
// ══════════════════════════════════════════
//  DATA — edit freely
// ══════════════════════════════════════════

const QUESTIONS = [
  {
    category: "資料與分析",
    text: "貴公司目前在資料收集與分析方面，處於何種狀態？",
    options: [
      { text: "資料已數位化並有基礎分析工具，但缺乏預測性洞察，難以主動發現問題或機會", score: 3 },
      { text: "僅依賴人工記錄與經驗判斷，缺乏系統性資料，難以進行有效分析",              score: 1 },
      { text: "已有數位化資料庫，但資料來源分散，即時性與整合性不足，難以形成全面洞察",    score: 2 },
      { text: "有部分資料系統化，但分析能力有限，決策仍偏重個人經驗而非數據",             score: 2 },
    ],
  },
  {
    category: "流程自動化",
    text: "貴公司在日常業務流程中，自動化程度如何？",
    options: [
      { text: "大多數流程仍為人工操作，幾乎沒有自動化工具",       score: 1 },
      { text: "部分重複性任務已導入自動化，但核心流程仍依賴人工",  score: 2 },
      { text: "多數流程已自動化，並有系統串接整合",               score: 3 },
      { text: "全面自動化並持續以 AI 優化流程與例外處理",          score: 4 },
    ],
  },
  {
    category: "AI 應用現況",
    text: "目前貴公司在哪些領域已實際導入 AI 技術？",
    options: [
      { text: "尚未導入任何 AI 相關工具或技術",                            score: 1 },
      { text: "僅使用一般 SaaS 工具（如 ChatGPT），未進行客製化整合",        score: 2 },
      { text: "已在特定業務（如客服、行銷、品管）導入 AI 解決方案",           score: 3 },
      { text: "AI 全面融入核心業務，包含預測模型、智慧排程等深度應用",         score: 4 },
    ],
  },
  {
    category: "組織數位能力",
    text: "貴公司員工對於數位工具與新技術的接受與應用能力？",
    options: [
      { text: "大多數員工抗拒新工具，數位轉型阻力大",           score: 1 },
      { text: "部分員工願意學習，但整體數位素養仍偏低",          score: 2 },
      { text: "多數員工能熟練使用數位工具，並有專責數位推動團隊", score: 3 },
      { text: "全員具備高度數位素養，並主動驅動創新應用",        score: 4 },
    ],
  },
  {
    category: "決策機制",
    text: "貴公司在做重要商業決策時，主要依據是？",
    options: [
      { text: "主要依靠管理階層的直覺與過去經驗",                   score: 1 },

    options: [

// Dimension grouping (for bar chart in results)
const DIMENSIONS = [
  { name: "資料與決策",     qIndexes: [0, 4] },
  { name: "流程與自動化",   qIndexes: [1, 5] },
  { name: "AI 應用深度",   qIndexes: [2] },
  { name: "組織能力",      qIndexes: [3, 7] },
  { name: "客戶體驗",      qIndexes: [6] },
];

// Score levels — adjust thresholds/labels/descriptions as needed
const LEVELS = [
  {
    min: 8, max: 13,
    name: "基礎級 Starter-level",
    title: "AI 轉型潛力待開發",
    desc: "貴公司目前在數位化與 AI 應用方面仍處於起步階段，多數業務流程依賴人工與經驗判斷，缺乏系統性資料支撐與自動化工具。然而，這也代表轉型空間相當巨大，只要踏出第一步，即可快速看見成效。",
    suggest: "建議從基礎數位化切入，優先建立資料收集機制與流程標準化。可考慮導入輕量 SaaS 工具，以低成本快速驗證智慧化效益，再逐步擴展至核心業務。",

    suggest: "建議重點投資在系統整合與資料治理，打通各部門資料流。同時選定 1-2 個高影響力場景（如預測性維護、客服 AI）進行深度 POC 驗證，快速積累成功案例。",
  },
  {
    min: 21, max: 27,
    name: "進階級 Advanced-level",
    title: "智慧轉型已啟動，深化應用是關鍵",
    desc: "貴公司已具備一定的數位化基礎，但在數據整合、流程優化或市場應變方面仍有進步空間。這表示公司導入智慧化解決方案的必要性高，能進一步深化營運效率與決策品質。透過智慧化，您將能打破現有瓶頸，實現更深層次的價值創造。",
    suggest: "建議進一步探索 AIoT 與大數據分析的應用，例如導入預測性維護、供應鏈優化、智慧決策輔助系統等，以提升整體營運的智慧化水平。可考慮與專業的 AIoT 或 SI 廠商合作，共同規劃進階解決方案。",

  {

    name: "領導級 Leader-level",
    title: "AI 驅動企業，引領產業變革",

    suggest: "建議持續探索生成式 AI、自主 AI Agent 等前沿技術，打造差異化競爭優勢。同時可考慮將內部最佳實踐外化，透過 AI 賦能生態系夥伴，強化整體產業鏈競爭力。",
  },
];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentQ = 0;
let answers  = new Array(QUESTIONS.length).fill(null); // stores option index

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  currentQ = 0;
  answers   = new Array(QUESTIONS.length).fill(null);
  renderQ();
  showScreen('quiz');
}

function renderQ() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  // progress
  document.getElementById('progressFill').style.width =
    `${((currentQ) / total) * 100}%`;

  document.getElementById('qCounter').textContent =
    `問題 ${currentQ + 1} / ${total}`;
  document.getElementById('qCategory').textContent = q.category;
  document.getElementById('qText').textContent = q.text;

  // options
  const ol = document.getElementById('optionsList');
  ol.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[currentQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-dot"></span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(i);
    ol.appendChild(btn);
  });

  // nav
  document.getElementById('btnPrev').disabled = currentQ === 0;
  updateNextBtn();

  // re-trigger animation
  const card = document.getElementById('qCard');
  card.classList.remove('fade-up');
  void card.offsetWidth;
  card.classList.add('fade-up');
}

function selectOption(i) {
  answers[currentQ] = i;
  document.querySelectorAll('.option-btn').forEach((b, idx) => {
    b.classList.toggle('selected', idx === i);
  });
  updateNextBtn();
}

function updateNextBtn() {
  const last = currentQ === QUESTIONS.length - 1;
  const btn  = document.getElementById('btnNext');
  btn.textContent = last ? '查看結果 ✓' : '下一題 →';
  btn.disabled    = answers[currentQ] === null;
}

function nextQ() {
  if (answers[currentQ] === null) return;
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQ();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQ(); }
}

function showResult() {
  // compute score
  const total = answers.reduce((sum, ans, qi) => {
    if (ans === null) return sum;
    return sum + QUESTIONS[qi].options[ans].score;
  }, 0);

  // find level
  const level = LEVELS.find(l => total >= l.min && total <= l.max) || LEVELS[LEVELS.length - 1];

  document.getElementById('scoreNum').textContent  = total;
  document.getElementById('levelBadge').textContent = level.name;
  document.getElementById('resultTitle').textContent = level.title;
  document.getElementById('resultDesc').textContent  = level.desc;
  document.getElementById('resultSuggest').textContent = level.suggest;

  // dimension bars
  const maxPerDim = 4; // max score per question
  const barsEl = document.getElementById('dimBars');
  barsEl.innerHTML = '';
  DIMENSIONS.forEach(dim => {
    const earned = dim.qIndexes.reduce((s, qi) => {
      if (answers[qi] === null) return s;
      return s + QUESTIONS[qi].options[answers[qi]].score;
    }, 0);
    const maxEarned = dim.qIndexes.length * maxPerDim;
    const pct = Math.round((earned / maxEarned) * 100);

    barsEl.innerHTML += `
      <div class="dim-item">
        <div class="dim-label-row"><span>${dim.name}</span><span>${pct}%</span></div>
        <div class="dim-bar-bg">
          <div class="dim-bar-fill" style="width:0%" data-pct="${pct}"></div>
        </div>
      </div>`;
  });

  showScreen('result');

  // animate bars after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.dim-bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    });
  });
}

function restart() {
  showScreen('hero');
}

// init
renderQ();
</script>
